name: 数字报警

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyqt5 pillow pyinstaller
        
        # 1. 从官方源安装 paddlepaddle（CPU版本，稳定可靠）
        pip install paddlepaddle==2.6.1 -f https://www.paddlepaddle.org.cn/whl/windows/mkl/avx/stable.html
        
        # 2. 安装 paddleocr 但不自动拉取 PyMuPDF 等编译失败的包
        pip install paddleocr==2.7.0 --no-deps
        
        # 3. 手动补上 PaddleOCR 真正需要的依赖（无 PyMuPDF）
        pip install opencv-python attrdict shapely pyclipper

    - name: Download PaddleOCR models
      run: |
        python -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=False, lang='ch', show_log=False); print('Models ready')"

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "数字报警" --add-data "$env:USERPROFILE\.paddleocr;./.paddleocr" --add-data "1.ico;." --hidden-import paddle --hidden-import win32api ScreenAlarm.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 数字报警
        path: dist\数字报警.exe
