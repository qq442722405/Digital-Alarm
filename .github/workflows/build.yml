name: 数字报警

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 配置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 建议使用 3.10，对 PaddleOCR 和 PyQt5 兼容性最好

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 使用 PyInstaller 打包
      run: |
        pyinstaller --noconsole --onefile --collect-all paddleocr --collect-all paddle --add-data "1.ico;." --name "ScreenMonitorAlarm" main.py

    - name: 上传生成的 EXE 成果物
      uses: actions/upload-artifact@v4
      with:
        name: ScreenMonitorAlarm-Windows
        path: dist/ScreenMonitorAlarm.exe
