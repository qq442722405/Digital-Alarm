name: 数字报警

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyqt5 pillow pyinstaller
        # 安装最新版 PaddlePaddle 和 PaddleOCR（会自动带 PyTorch，但云端编译无问题）
        pip install paddlepaddle paddleocr

    - name: Download PaddleOCR models (will be stored in ~/.paddlex)
      run: |
        python -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(lang='ch', show_log=False); print('Models ready')"

    - name: Build EXE (collect all dependencies automatically)
      run: |
        pyinstaller --onefile --windowed --name "数字报警" --add-data "$env:USERPROFILE\.paddlex;./.paddlex" --add-data "1.ico;." --collect-all paddleocr --collect-all paddle --collect-all torch --hidden-import win32api ScreenAlarm.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: 数字报警
        path: dist\数字报警.exe
